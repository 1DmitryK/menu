<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Меню на 28 дней</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --pink:#E91E63;--pink-light:#FCE4EC;--pink-dark:#880E4F;--coral:#FF6B6B;
      --cream:#FFF8F0;--sage:#A8C5A0;--sage-light:#E8F5E4;--charcoal:#2D2D2D;
      --warm-gray:#6B6B6B;--card-shadow:0 2px 20px rgba(0,0,0,.06);
      --card-hover:0 8px 40px rgba(233,30,99,.12);--radius:16px
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;-webkit-font-smoothing:antialiased}

    .header{
      background:linear-gradient(135deg,var(--pink),var(--coral));
      padding:2rem 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden
    }
    .header::before{
      content:'';position:absolute;top:-50%;left:-20%;width:140%;height:200%;
      background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,.15) 0%,transparent 60%);
      pointer-events:none
    }
    .header h1{
      font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,3rem);
      color:#fff;font-weight:900;letter-spacing:-.02em;position:relative
    }
    .today-line{
      margin-top:.7rem;color:rgba(255,255,255,.95);font-size:.95rem;font-weight:700;position:relative
    }

    .smart-bar{
      background:#fff;padding:1rem 1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.05);
      display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between
    }
    .date-controls,.shopping-controls{
      display:flex;flex-wrap:wrap;gap:.6rem;align-items:center
    }
    .date-picker-wrap{
      display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;font-size:.92rem;color:var(--warm-gray)
    }
    .date-picker-wrap input,.shopping-controls select{
      padding:.55rem .8rem;border:1px solid #e8d7de;border-radius:12px;
      font-family:'Nunito',sans-serif;font-size:.92rem;background:#fff
    }
    .nav-btn{
      border:none;background:#fff;color:var(--pink);border:2px solid var(--pink-light);
      padding:.6rem 1rem;border-radius:999px;font-family:'Nunito',sans-serif;
      font-size:.88rem;font-weight:700;cursor:pointer;transition:all .25s
    }
    .nav-btn:hover{transform:translateY(-1px);background:var(--pink-light)}
    .nav-btn.primary{background:var(--pink);border-color:var(--pink);color:#fff}
    .nav-btn.primary:hover{background:var(--pink-dark);border-color:var(--pink-dark)}

    .week-nav{
      display:flex;gap:.5rem;padding:1rem 1.5rem;overflow-x:auto;
      -webkit-overflow-scrolling:touch;scrollbar-width:none;background:#fff;
      position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06)
    }
    .week-nav::-webkit-scrollbar{display:none}
    .week-btn{
      flex-shrink:0;padding:.5rem 1.2rem;border:2px solid var(--pink-light);
      background:#fff;border-radius:50px;font-family:'Nunito',sans-serif;
      font-size:.85rem;font-weight:700;color:var(--pink);cursor:pointer;
      transition:all .3s;white-space:nowrap
    }
    .week-btn.active,.week-btn:hover{background:var(--pink);color:#fff;border-color:var(--pink);transform:translateY(-1px)}

    .day-nav{
      display:flex;gap:.4rem;padding:.8rem 1.5rem;overflow-x:auto;
      -webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--pink-light)
    }
    .day-nav::-webkit-scrollbar{display:none}
    .day-btn{
      flex-shrink:0;width:48px;height:48px;border:none;background:#fff;border-radius:50%;
      font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;color:var(--pink-dark);
      cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;
      justify-content:center;line-height:1
    }
    .day-btn .wd{font-size:.55rem;font-weight:600;color:var(--warm-gray);margin-bottom:1px}
    .day-btn.active{background:var(--pink);color:#fff;transform:scale(1.1);box-shadow:0 4px 15px rgba(233,30,99,.3)}
    .day-btn.active .wd{color:rgba(255,255,255,.8)}

    .content{padding:1.5rem;max-width:900px;margin:0 auto}
    .day-title{
      font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--pink-dark);
      margin-bottom:1.5rem;display:flex;align-items:baseline;gap:.5rem
    }
    .day-title .num{
      background:var(--pink);color:#fff;width:36px;height:36px;border-radius:50%;
      display:inline-flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;
      font-size:.9rem;font-weight:700;flex-shrink:0
    }
    .day-title .weekday{color:var(--warm-gray);font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:400}

    .meal-section{margin-bottom:1.5rem;animation:fadeUp .4s ease-out both}
    .meal-section:nth-child(2){animation-delay:.1s}
    .meal-section:nth-child(3){animation-delay:.2s}
    .meal-section:nth-child(4){animation-delay:.3s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .meal-label{
      display:inline-flex;align-items:center;gap:.4rem;font-weight:700;font-size:.85rem;
      text-transform:uppercase;letter-spacing:.08em;margin-bottom:.8rem;padding:.35rem .9rem;border-radius:50px
    }
    .meal-label.breakfast{background:#FFF3E0;color:#E65100}
    .meal-label.lunch{background:#E8F5E9;color:#2E7D32}
    .meal-label.dinner{background:#E3F2FD;color:#1565C0}
    .meal-label .icon{font-size:1rem}

    .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
    @media(max-width:640px){.options-grid{grid-template-columns:1fr}}

    .option-card{
      background:#fff;border-radius:var(--radius);padding:1.2rem;box-shadow:var(--card-shadow);
      transition:all .3s;border:1px solid rgba(0,0,0,.04);position:relative;overflow:hidden
    }
    .option-card:hover{box-shadow:var(--card-hover);transform:translateY(-2px)}
    .option-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .option-card.opt-a::before{background:linear-gradient(90deg,var(--pink),var(--coral))}
    .option-card.opt-b::before{background:linear-gradient(90deg,var(--sage),#7CB342)}
    .option-card.selected{border-color:var(--pink);box-shadow:0 4px 15px rgba(233,30,99,.2);transform:translateY(-2px)}

    .badge{
      position:absolute;top:10px;right:10px;padding:.18rem .5rem;border-radius:999px;
      font-size:.65rem;font-weight:800;color:#fff;background:rgba(0,0,0,.35)
    }

    .option-card h3{
      font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;line-height:1.35;
      margin-bottom:.5rem;color:var(--charcoal)
    }
    .meta-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem;flex-wrap:wrap}
    .time-badge,.kcal-badge{
      display:inline-flex;align-items:center;gap:.25rem;font-size:.75rem;padding:.15rem .5rem;border-radius:50px
    }
    .time-badge{color:var(--warm-gray);background:#f5f5f5}
    .kcal-badge{color:#E65100;background:#FFF3E0;font-weight:700}

    .card-actions{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.2rem}
    .select-btn{
      display:inline-flex;align-items:center;gap:.3rem;background:none;border:1px solid var(--pink-light);
      padding:.35rem .8rem;border-radius:50px;font-family:'Nunito',sans-serif;font-size:.78rem;
      font-weight:700;color:var(--pink);cursor:pointer;transition:all .2s
    }
    .select-btn:hover{background:var(--pink-light)}
    .select-btn.selected{background:var(--pink);border-color:var(--pink);color:#fff}

    .recipe-toggle{
      display:flex;align-items:center;gap:.3rem;background:none;border:1px solid var(--pink-light);
      padding:.35rem .8rem;border-radius:50px;font-family:'Nunito',sans-serif;font-size:.78rem;
      font-weight:600;color:var(--pink);cursor:pointer;transition:all .2s
    }
    .recipe-toggle:hover{background:var(--pink-light)}
    .recipe-toggle .arrow{transition:transform .3s;font-size:.6rem}
    .recipe-toggle.open .arrow{transform:rotate(180deg)}
    .recipe-details{display:none;margin-top:.8rem;padding-top:.8rem;border-top:1px solid #f0f0f0}
    .recipe-details.show{display:block;animation:fadeUp .3s ease-out}
    .recipe-details h4{
      font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--pink);
      font-weight:700;margin-bottom:.3rem;margin-top:.6rem
    }
    .recipe-details h4:first-child{margin-top:0}
    .recipe-details p{font-size:.82rem;line-height:1.55;color:#555}

    .shopping-box{padding:0 1.5rem 2.5rem;max-width:900px;margin:0 auto}
    .shopping-box .inner{
      margin-top:2rem;background:#fff;border-radius:var(--radius);box-shadow:var(--card-shadow);
      padding:1.2rem;border:1px solid rgba(0,0,0,.04)
    }
    .shopping-box h2{
      font-family:'Playfair Display',serif;color:var(--pink-dark);font-size:1.35rem;margin-bottom:1rem
    }
    .shopping-range-info{margin:.9rem 0;font-size:.9rem;color:var(--warm-gray)}
    .shopping-list{display:grid;gap:.8rem}
    .shopping-category{background:var(--pink-light);border-radius:14px;padding:.9rem 1rem}
    .shopping-category h3{margin-bottom:.55rem;font-size:.95rem;color:var(--pink-dark)}
    .shopping-category ul{margin:0;padding-left:1.1rem}
    .shopping-category li{margin:.25rem 0;line-height:1.45;color:#444}
    .empty-note{color:var(--warm-gray);font-size:.92rem}
    .help-note{font-size:.85rem;color:var(--warm-gray);margin-top:.5rem}

    @media print{
      .smart-bar,.week-nav,.day-nav,.shopping-controls,.recipe-toggle,.select-btn,.help-note{display:none!important}
      .recipe-details{display:block!important}
      .option-card{break-inside:avoid}
    }
    @media(max-width:640px){
      .smart-bar{padding:1rem}
      .date-controls,.shopping-controls{width:100%}
      .nav-btn{flex:1 1 auto;text-align:center}
      .shopping-box{padding:0 1rem 2rem}
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Меню на 28 дней</h1>
    <p class="today-line" id="todayLine"></p>
  </div>

  <div class="smart-bar">
    <div class="date-controls">
      <button class="nav-btn" id="prevDayBtn">← Вчера</button>
      <button class="nav-btn primary" id="todayBtn">Сегодня</button>
      <button class="nav-btn" id="nextDayBtn">Завтра →</button>
    </div>
    <div class="date-picker-wrap">
      <label for="datePicker">Выбрать дату:</label>
      <input type="date" id="datePicker">
    </div>
  </div>

  <div class="week-nav" id="wN"></div>
  <div class="day-nav" id="dN"></div>

  <div class="content">
    <div id="co"></div>
  </div>

  <div class="shopping-box">
    <div class="inner">
      <h2>Список покупок (по выбранным вариантам)</h2>
      <div class="shopping-controls">
        <label for="shoppingDays">Период:</label>
        <select id="shoppingDays">
          <option value="7">7 дней</option>
          <option value="10">10 дней</option>
          <option value="14">14 дней</option>
          <option value="28">28 дней</option>
        </select>
        <button class="nav-btn primary" id="buildShoppingBtn">Показать список</button>
        <button class="nav-btn" id="copyShoppingBtn">Скопировать список</button>
        <button class="nav-btn" id="resetSelBtn">Сбросить выбор</button>
      </div>
      <div class="help-note">Если вариант не выбран, по умолчанию учитывается вариант A.</div>
      <div id="shoppingRangeInfo" class="shopping-range-info"></div>
      <div id="shoppingList" class="shopping-list"></div>
    </div>
  </div>

  <script>
    const B=[
      ["Овсянка с ягодами, банан, орехи и семена","20 мин","банан – 100 г, ягоды – 50 г, овсяная крупа – 50 г, миндаль – 10 г, кунжут – 5 г, масло – 3 г","1. Овсянку отварить 10–15 мин. 2. Добавить банан, орехи, семена и ягоды.",370],
      ["Яичница со шпинатом, помидором и зеленью + ц/з хлеб","20 мин","яйца – 2 шт., помидор – 100 г, шпинат – 50 г, ц/з хлеб – 50 г, зелень – 30 г, масло – 5 г","1. Тушить помидор и шпинат 5–7 мин. 2. Влить яйца, 5–7 мин под крышкой. 3. С хлебом.",340],
      ["Творожные маффины с овощами и сметаной","25 мин","творог 5% – 100 г, помидор – 50 г, яйцо – 1 шт., кабачок – 50 г, грибы – 40 г, мука – 40 г, сметана – 30 г","1. Овощи нарезать. 2. Яйцо + мука + творог + овощи. 3. Запекать при 180°С 15–20 мин.",380],
      ["Омлет с овощами и зеленью + ц/з тост","15 мин","яйца – 2 шт., кабачок – 60 г, помидор – 70 г, ц/з хлеб – 30 г, зелень – 20 г, масло – 3 г","1. Овощи нарезать, яйца взбить. 2. Жарить под крышкой. 3. Хлеб в тостере.",290],
      ["Творог с овощами, грецкими орехами и сметаной","7 мин","творог 5% – 130 г, помидор – 50 г, огурец – 40 г, перец – 40 г, сметана – 30 г, орехи – 20 г, зелень – 20 г","1. Зелень + творог + сметана + орехи. 2. Овощи нарезать, заправить лимоном.",350],
      ["Яичница с горошком, шпинатом и помидорами + ц/з хлеб","10 мин","яйца – 2 шт., помидор – 100 г, горошек – 80 г, шпинат – 50 г, ц/з хлеб – 50 г","1. Горошек, шпинат и помидоры тушить. 2. Добавить яйца. 3. С хлебом.",360],
      ["Кукурузная каша с овощами, шпинатом и сыром","15 мин","огурец – 70 г, помидор – 60 г, кукурузная крупа – 60 г, сыр – 30 г, шпинат – 20 г, масло – 5 г","1. Крупу обжарить, сварить. 2. Шпинат в кашу. 3. Сыр сверху, подавать с овощами.",340],
      ["Овсянка с тыквой, яблоком и орехами","25 мин","тыква – 100 г, яблоко – 50 г, овсянка – 50 г, орехи – 15 г, мёд – 10 г, масло – 5 г, корица","1. Овсянку отварить. 2. Тыкву тушить 10–15 мин. 3. Добавить тыкву и яблоко с орехами.",360],
      ["Киноа с яблоком, финиками и орехами","25 мин","яблоко – 120 г, киноа – 50 г, финики – 20 г, грецкие орехи – 10 г","1. Киноа отварить 15–20 мин. 2. Яблоко натереть, смешать с киноа, финиками и орехами.",340],
      ["Яйца-пашот и фета на ц/з хлебе с помидорами и салатом","15 мин","яйца – 2 шт., ц/з хлеб – 70 г, помидор – 40 г, фета – 30 г, зелень – 10 г, масло – 5 г, огурец – 70 г, салат – 30 г","1. Яйца пашот. 2. Помидоры + зелень на хлеб с фетой, яйцо сверху. 3. Огурец + салат + лимон.",420],
      ["Творог с малиной, маково-льняной кашей и мёдом","5 мин","ягоды – 150 г, творог – 130 г, мёд – 10 г, мак – 10 г, семена льна – 10 г, кунжут – 5 г","1. Ягоды на творог. 2. Лён, мак, кунжут перемолоть, развести водой + мёд. Залить творог.",330],
      ["Пшённая каша с запечённой тыквой, изюмом и брынзой","30 мин","тыква – 140 г, пшённая крупа – 50 г, брынза – 20 г, изюм – 10 г, корица","1. Крупу отварить 15–20 мин. 2. Тыкву запечь 20–30 мин. 3. Подавать с изюмом и сыром.",310],
      ["Овсяные оладьи с ягодами и бананом","20 мин","банан – 50 г, йогурт – 80 г, овсянка – 40 г, ягоды – 100 г, яйцо – 1 шт., масло – 3 г, корица","1. Всё в блендере. 2. Выпекать по 4–5 мин с каждой стороны. 3. Йогурт и ягоды сверху.",330],
      ["Запеканка с грушей и сметаной","30 мин","творог 5% – 140 г, груша – 70 г, яйцо – 1 шт., сметана – 30 г, мука – 30 г, масло – 3 г, корица","1. Творог + яйцо + мука + корица. 2. Грушу на дно. 3. Запекать при 200°С 20–25 мин.",370],
      ["Перловая каша с ягодами, фруктами и орехами","20 мин","яблоко – 100 г, перловка – 50 г, ягоды – 50 г, орехи – 10 г, кунжут – 5 г","1. Перловку отварить 10 мин. 2. Яблоко проварить с кашей. 3. Подать с ягодами и орехами.",320],
      ["Фриттата с овощами, салат из пекинской капусты и ц/з хлеб","15 мин","яйца – 2 шт., помидор – 50 г, маслины – 20 г, лук – 20 г, хлеб – 30 г, моцарелла – 20 г. Салат: пекинская капуста – 85 г, салат – 15 г, масло – 5 г","1. Зелень + яйца. Лук обжарить, маслины, яйца. 2. Помидор и сыр, под крышкой. 3. Капусту заправить.",380],
      ["Шакшука с ц/з хлебом","20 мин","помидор – 180 г, яйца – 2 шт., хлеб – 50 г, лук – 30 г, зелень – 10 г, масло – 5 г, чеснок, чили","1. Чеснок и чили обжарить, + томаты + лук, 10 мин. 2. Вбить яйца, 7 мин. 3. С хлебом.",340],
      ["Банановые сырники с ягодами и сметаной","25 мин","творог 5% – 120 г, ягоды – 100 г, банан – 50 г, сметана – 30 г, мука – 20 г, семена льна – 10 г","1. Творог + банан + мука + семена. Сырники. 2. Обжарить по 5–7 мин. Со сметаной.",380],
      ["Гранола с ягодами, яблоком и йогуртом","30 мин","йогурт – 100 г, яблоко – 100 г, ягоды – 50 г, овсянка – 50 г, орехи – 10 г, мёд – 10 г, семена – 10 г","1. Хлопья + орехи + семена запекать 25 мин. 2. + мёд. 3. Слоями с йогуртом и фруктами.",400],
      ["Овсянка с печёным яблоком, бананом и корицей","20 мин","банан – 100 г, хлопья – 50 г, яблоко – 60 г, орехи – 15 г, семена тыквы – 5 г, корица","1. Яблоко запечь 20 мин. 2. Хлопья 5–7 мин + банан + корица. 3. Орехи сверху.",370],
      ["Овсянка с яблоком, ягодами и орехами","15 мин","яблоко – 100 г, овсянка – 50 г, ягоды – 50 г, орехи – 15 г, корица","1. Овсянку отварить 15 мин. 2. + тёртое яблоко, корица, ягоды и орехи.",330],
      ["Булгур и запеканка из кабачка с сыром","30 мин","кабачок – 70 г, булгур – 50 г, помидор – 30 г, яйцо – 1 шт., моцарелла – 20 г, мука – 30 г, лук – 20 г","1. Булгур сварить. 2. Кабачок + яйцо + мука. 3. Запекать 15 мин, + помидор + сыр, ещё 15 мин.",390],
      ["Блинчики с творогом и изюмом","20 мин","творог – 100 г, молоко ореховое – 110 г, мука – 40 г, яйцо – 1 шт., сметана – 20 г, изюм – 20 г, масло – 5 г","1. Изюм замочить. 2. Яйцо + молоко + мука. 3. Жарить блинчики. 4. Творог + изюм. Со сметаной.",400],

      ["Шампиньоны с киноа и пюре из шпината с горошком","35 мин","шампиньоны – 125 г, киноа – 35 г, моцарелла – 30 г. Шпинат – 80 г, горошек – 50 г, сливки – 10 г, чеснок","1. Киноа отварить. 2. Ножки + лук, нафаршировать + сыр, запечь 15 мин. 3. Шпинат + горошек пюрировать.",290],
      ["Котлеты из индейки и пюре из цветной капусты","25 мин","фарш индейки – 215 г, лук – 10 г, масло – 5 г, чеснок, зира, базилик. Цветная капуста – 240 г, масло – 15 г, мускатный орех","1. Фарш + лук + специи, обжарить, в духовку 20 мин. 2. Капусту на пару, пюрировать.",360]
    ];

    const WD=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    const WF=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
    const T=28;
    const START_DATE = new Date('2026-04-19T00:00:00');
    const MT=[
      {l:'Завтрак',i:'🌅',c:'breakfast',k:'b'},
      {l:'Обед',i:'☀️',c:'lunch',k:'l'},
      {l:'Ужин',i:'🌙',c:'dinner',k:'d'}
    ];

    const plan=[];
    for(let d=0; d<T; d++){
      plan.push({
        day:d+1,
        wd:WF[d%7],
        ws:WD[d%7],
        b:[B[d%B.length], B[(d+14)%B.length]],
        l:[L[d%L.length], L[(d+14)%L.length]],
        d:[D[d%D.length], D[(d+14)%D.length]]
      });
    }

    function normalizeDate(date){
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }
    function mod(n,m){
      return ((n%m)+m)%m;
    }
    function daysBetween(a,b){
      return Math.floor((normalizeDate(a)-normalizeDate(b))/(24*60*60*1000));
    }
    function getCycleDayIndexByDate(date){
      return mod(daysBetween(date, START_DATE), T);
    }
    function getWeekIndexFromDayIndex(idx){
      return Math.floor(idx/7);
    }
    function formatDateRu(date){
      return date.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
    }
    function formatInputDate(date){
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,'0');
      const d = String(date.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }

    let selectedDate = normalizeDate(new Date());
    let cD = getCycleDayIndexByDate(selectedDate);
    let cW = getWeekIndexFromDayIndex(cD);

    const STORAGE_KEY = 'menuSelectionsV1';

    function getDefaultSelections(){
      const s = [];
      for(let i=0;i<T;i++){
        s.push({b:0,l:0,d:0});
      }
      return s;
    }

    function loadSelections(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return getDefaultSelections();
        const parsed = JSON.parse(raw);
        if(!Array.isArray(parsed) || parsed.length !== T) return getDefaultSelections();
        return parsed.map(x => ({
          b: x && (x.b===1 ? 1 : 0),
          l: x && (x.l===1 ? 1 : 0),
          d: x && (x.d===1 ? 1 : 0)
        }));
      }catch(e){
        return getDefaultSelections();
      }
    }

    let selections = loadSelections();

    function saveSelections(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(selections));
    }

    function setSelection(dayIndex, mealKey, optionIndex){
      selections[dayIndex][mealKey] = optionIndex;
      saveSelections();
      render();
      buildShoppingList();
    }

    function resetSelections(){
      selections = getDefaultSelections();
      saveSelections();
      render();
      buildShoppingList();
    }

    function cleanIngredientLabel(text){
      return text
        .replace(/^\s*(Суп|Салат|Гарнир|Каша|Соус)\s*:\s*/i,'')
        .replace(/\.$/,'')
        .trim();
    }

    function parseIngredientString(str){
      const prepared = str
        .replace(/\.\s*(Суп|Салат|Гарнир|Каша|Соус)\s*:/g, ', $1:');

      const parts = prepared.split(',').map(x => x.trim()).filter(Boolean);
      const result = [];

      parts.forEach(part => {
        const cleaned = cleanIngredientLabel(part);
        const match = cleaned.match(/^(.+?)\s*[-–—]\s*([\d.,]+)\s*([а-яА-Яa-zA-Z%]+)?$/u);

        if(match){
          result.push({
            name: match[1].trim().toLowerCase(),
            amount: parseFloat(match[2].replace(',','.')),
            unit: (match[3] || '').trim().toLowerCase()
          });
        }else{
          result.push({
            name: cleaned.toLowerCase(),
            amount: null,
            unit: ''
          });
        }
      });

      return result;
    }

    function prettyName(name){
      return name ? name.charAt(0).toUpperCase() + name.slice(1) : '';
    }

    function getCategory(name){
      const n = name.toLowerCase();

      if (/(ябл|груш|банан|ягод|лимон|апельсин|финик|изюм|кураг)/.test(n)) return 'Фрукты и ягоды';
      if (/(помид|огур|морков|лук|капуст|перец|шпинат|кабач|тыкв|брокколи|сельдер|редьк|баклаж|салат|чеснок|горошек|свёкл|свекл)/.test(n)) return 'Овощи и зелень';
      if (/(овсян|греч|рис|булгур|киноа|пшён|пшено|перлов|спагетти|макарон|кускус|крупа|полента|мука|хлеб)/.test(n)) return 'Крупы и мучное';
      if (/(яйц|рыба|скумбр|форель|треск|минтай|кревет|куриц|индейк|теляти|фарш|печень|кролик|перепёл|кальмар|нут|фасол|чечевиц|маш|горох|бедро|филе)/.test(n)) return 'Белки';
      if (/(творог|сыр|брынза|моцарелла|фета|йогурт|сметан|сливки|молоко|пармезан)/.test(n)) return 'Молочные продукты';
      if (/(масло|орех|миндаль|кунжут|семена|лён|льна|мак|мёд|мед|маслины|уксус|горчиц|корица|чили|тимьян|зира|базилик|травы|специи|карри|чеснок)/.test(n)) return 'Прочее';

      return 'Прочее';
    }

    function updateTopDateInfo(){
      document.getElementById('todayLine').textContent = `${formatDateRu(selectedDate)} • День ${cD + 1}`;
      document.getElementById('datePicker').value = formatInputDate(selectedDate);
    }

    function renderWeekNav(){
      const w = document.getElementById('wN');
      w.innerHTML = '';
      for(let i=0;i<4;i++){
        const b = document.createElement('button');
        b.className = 'week-btn' + (i===cW ? ' active' : '');
        b.textContent = 'Неделя ' + (i+1);
        b.onclick = () => {
          cW = i;
          cD = i*7;
          const offset = cD - getCycleDayIndexByDate(selectedDate);
          const newDate = new Date(selectedDate);
          newDate.setDate(newDate.getDate() + offset);
          selectedDate = normalizeDate(newDate);
          render();
        };
        w.appendChild(b);
      }
    }

    function renderDayNav(){
      const dn = document.getElementById('dN');
      dn.innerHTML = '';
      for(let d=cW*7; d<cW*7+7; d++){
        const b = document.createElement('button');
        b.className = 'day-btn' + (d===cD ? ' active' : '');
        b.innerHTML = '<span class="wd">'+plan[d].ws+'</span>'+plan[d].day;
        b.onclick = () => {
          cD = d;
          const offset = d - getCycleDayIndexByDate(selectedDate);
          const newDate = new Date(selectedDate);
          newDate.setDate(newDate.getDate() + offset);
          selectedDate = normalizeDate(newDate);
          cW = getWeekIndexFromDayIndex(cD);
          render();
        };
        dn.appendChild(b);
      }
    }

    function renderContent(){
      const p = plan[cD];
      let h = '<div class="day-title"><span class="num">'+p.day+'</span>День '+p.day+'<span class="weekday">• '+p.wd+'</span></div>';

      MT.forEach((m,mi) => {
        const data = p[m.k];
        h += '<div class="meal-section">';
        h += '<div class="meal-label '+m.c+'"><span class="icon">'+m.i+'</span>'+m.l+'</div>';
        h += '<div class="options-grid">';

        data.forEach((o,oi) => {
          const id = 'r'+cD+'_'+mi+'_'+oi;
          const selected = selections[cD][m.k] === oi;
          h += '<div class="option-card '+(oi ? 'opt-b' : 'opt-a')+(selected ? ' selected' : '')+'">';
          h += '<div class="badge">Вариант '+(oi===0 ? 'A' : 'B')+'</div>';
          h += '<h3>'+o[0]+'</h3>';
          h += '<div class="meta-row"><span class="time-badge">⏱ '+o[1]+'</span><span class="kcal-badge">🔥 '+o[4]+' ккал</span></div>';
          h += '<div class="card-actions">';
          h += '<button class="select-btn'+(selected ? ' selected' : '')+'" onclick="setSelection('+cD+',\''+m.k+'\','+oi+')">'+(selected ? '✓ Выбрано' : 'Выбрать')+'</button>';
          h += '<button class="recipe-toggle" onclick="tog(\''+id+'\',this)">Рецепт <span class="arrow">▼</span></button>';
          h += '</div>';
          h += '<div class="recipe-details" id="'+id+'"><h4>Ингредиенты</h4><p>'+o[2]+'</p><h4>Приготовление</h4><p>'+o[3]+'</p></div>';
          h += '</div>';
        });

        h += '</div></div>';
      });

      document.getElementById('co').innerHTML = h;
    }

    function render(){
      cD = getCycleDayIndexByDate(selectedDate);
      cW = getWeekIndexFromDayIndex(cD);
      updateTopDateInfo();
      renderWeekNav();
      renderDayNav();
      renderContent();
    }

    function tog(id,btn){
      document.getElementById(id).classList.toggle('show');
      btn.classList.toggle('open');
    }

    function collectIngredientsForDays(startIndex, numberOfDays){
      const summary = {};

      for(let i=0;i<numberOfDays;i++){
        const dayIndex = (startIndex + i) % T;
        const dayPlan = plan[dayIndex];

        ['b','l','d'].forEach(key => {
          const selectedOptionIndex = selections[dayIndex][key] ?? 0;
          const option = dayPlan[key][selectedOptionIndex];
          const ingredients = parseIngredientString(option[2]);

          ingredients.forEach(item => {
            const mapKey = `${item.name}__${item.unit}`;
            if(!summary[mapKey]){
              summary[mapKey] = {
                name:item.name,
                unit:item.unit,
                amount:0,
                count:0,
                hasNumeric:item.amount !== null
              };
            }

            if(item.amount !== null && !Number.isNaN(item.amount)){
              summary[mapKey].amount += item.amount;
            }else{
              summary[mapKey].count += 1;
            }
          });
        });
      }

      return Object.values(summary);
    }

    function buildShoppingList(){
      const days = parseInt(document.getElementById('shoppingDays').value, 10) || 7;
      const items = collectIngredientsForDays(cD, days);

      const grouped = {};
      items.forEach(item => {
        const category = getCategory(item.name);
        if(!grouped[category]) grouped[category] = [];
        grouped[category].push(item);
      });

      Object.keys(grouped).forEach(cat => {
        grouped[cat].sort((a,b) => a.name.localeCompare(b.name, 'ru'));
      });

      const order = ['Овощи и зелень','Фрукты и ягоды','Крупы и мучное','Белки','Молочные продукты','Прочее'];

      const startDate = new Date(selectedDate);
      const endDate = new Date(selectedDate);
      endDate.setDate(endDate.getDate() + days - 1);

      document.getElementById('shoppingRangeInfo').textContent = `Период: ${formatDateRu(startDate)} — ${formatDateRu(endDate)}`;

      const container = document.getElementById('shoppingList');
      let html = '';

      order.forEach(cat => {
        if(!grouped[cat] || !grouped[cat].length) return;

        html += `<div class="shopping-category"><h3>${cat}</h3><ul>`;
        grouped[cat].forEach(item => {
          let value = '';
          if(item.hasNumeric){
            value = `${Math.round(item.amount * 10) / 10}${item.unit ? ' ' + item.unit : ''}`;
          }else{
            value = 'проверить вручную';
          }
          html += `<li><strong>${prettyName(item.name)}</strong> — ${value}</li>`;
        });
        html += `</ul></div>`;
      });

      if(!html){
        html = '<p class="empty-note">Не удалось собрать список покупок.</p>';
      }

      container.innerHTML = html;
    }

    function copyShoppingList(){
      const categories = document.querySelectorAll('.shopping-category');
      if(!categories.length){
        alert('Сначала сформируй список покупок.');
        return;
      }

      let text = 'Список покупок\n\n';
      text += document.getElementById('shoppingRangeInfo').textContent + '\n\n';

      categories.forEach(cat => {
        const title = cat.querySelector('h3')?.textContent || '';
        text += title + '\n';

        cat.querySelectorAll('li').forEach(li => {
          text += '- ' + li.textContent + '\n';
        });

        text += '\n';
      });

      navigator.clipboard.writeText(text)
        .then(() => alert('Список покупок скопирован.'))
        .catch(() => alert('Не удалось скопировать список.'));
    }

    document.getElementById('prevDayBtn').addEventListener('click', () => {
      selectedDate.setDate(selectedDate.getDate() - 1);
      selectedDate = normalizeDate(selectedDate);
      render();
      buildShoppingList();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      selectedDate = normalizeDate(new Date());
      render();
      buildShoppingList();
    });

    document.getElementById('nextDayBtn').addEventListener('click', () => {
      selectedDate.setDate(selectedDate.getDate() + 1);
      selectedDate = normalizeDate(selectedDate);
      render();
      buildShoppingList();
    });

    document.getElementById('datePicker').addEventListener('change', (e) => {
      if(!e.target.value) return;
      selectedDate = normalizeDate(new Date(e.target.value + 'T00:00:00'));
      render();
      buildShoppingList();
    });

    document.getElementById('buildShoppingBtn').addEventListener('click', buildShoppingList);
    document.getElementById('copyShoppingBtn').addEventListener('click', copyShoppingList);
    document.getElementById('resetSelBtn').addEventListener('click', () => {
      resetSelections();
    });

    render();
    buildShoppingList();
  </script>
</body>
</html>
